<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
  background: linear-gradient(160deg, #f0f1ff 0%, #e0e2ff 30%, #ede9fe 60%, #f5f3ff 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
}

.app {
  width: 90%;
  max-width: 460px;
  min-height: 440px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border-radius: 32px;
  padding: 44px 30px 40px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 12px 40px rgba(99,102,241,0.10);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.app::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -40px;
  width: 160px;
  height: 160px;
  background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.page { display: none; }
.page.active { display: block; }

h1 {
  font-size: 28px;
  font-weight: 700;
  color: #1e1b4b;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.subtitle {
  font-size: 15px;
  color: #888;
  margin-bottom: 32px;
}

/* 步骤点 */
.steps { display: flex; justify-content: center; gap: 8px; margin-bottom: 28px; }
.step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #d4d4d8; transition: all 0.3s;
}
.step-dot.done { background: #6366f1; }
.step-dot.current { background: #6366f1; width: 24px; border-radius: 4px; }

/* 选项卡片 */
.option-cards { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }

.option-card {
  flex: 1 1 calc(50% - 7px);
  min-width: 130px;
  padding: 28px 18px;
  border-radius: 20px;
  border: 2px solid #e4e4e7;
  background: #fafafa;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.option-card:active { transform: scale(0.97); }
.option-card.active {
  border-color: #6366f1;
  background: #eef2ff;
  box-shadow: 0 4px 16px rgba(99,102,241,0.15);
}
.option-card .emoji { font-size: 40px; display: block; margin-bottom: 10px; }
.option-card .label { font-size: 18px; font-weight: 600; color: #3f3f46; }
.option-card .desc { font-size: 13px; color: #999; margin-top: 4px; }

/* 年龄滑块 */
.age-section { padding: 0 10px; }
.age-display {
  font-size: 56px; font-weight: 800; color: #6366f1;
  margin-bottom: 8px; letter-spacing: -2px;
}
.age-unit { font-size: 20px; color: #888; margin-bottom: 24px; }

.age-slider {
  -webkit-appearance: none; width: 100%; height: 6px;
  border-radius: 3px; background: linear-gradient(to right, #e0e2ff 0%, #6366f1 100%);
  outline: none;
}
.age-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 36px; height: 36px;
  border-radius: 50%; background: #fff; border: 3px solid #6366f1;
  box-shadow: 0 2px 8px rgba(99,102,241,0.25); cursor: pointer;
}

/* 搜索动画 */
.search-ring {
  width: 72px; height: 72px; border: 3px solid #e4e4e7;
  border-top-color: #6366f1; border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.search-text { font-size: 17px; color: #6366f1; font-weight: 600; }

/* 结果卡片 */
.result-card {
  background: linear-gradient(135deg, #faf9ff 0%, #f0eeff 100%);
  border-radius: 24px; padding: 28px 24px;
  border: 1.5px solid #e0e0ff;
  text-align: left;
}
.result-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff; font-size: 30px; line-height: 64px; text-align: center;
  margin: 0 auto 20px;
}
.result-name {
  font-size: 28px; font-weight: 700; color: #1e1b4b;
  text-align: center; margin-bottom: 4px;
}
.result-city {
  font-size: 14px; color: #6366f1; text-align: center; margin-bottom: 20px;
}
.result-row {
  display: flex; justify-content: space-between; padding: 12px 0;
  border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 15px;
}
.result-row:last-child { border-bottom: none; }
.result-row .key { color: #888; }
.result-row .val { color: #1e1b4b; font-weight: 500; text-align: right; }

/* 故事 */
.story-card {
  background: #fff; border-radius: 16px; padding: 20px;
  margin-top: 16px; text-align: left; line-height: 1.8;
  font-size: 15px; color: #444; border: 1px solid #f0f0f0;
}

/* 按钮 */
.btn-row { display: flex; gap: 10px; margin-top: 24px; }

.btn {
  flex: 1; padding: 15px 20px; border-radius: 16px;
  border: none; font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff; box-shadow: 0 4px 16px rgba(99,102,241,0.3);
}
.btn-primary:disabled {
  background: #d4d4d8; box-shadow: none; color: #999; cursor: not-allowed;
}

.btn-outline {
  background: #fff; color: #6366f1; border: 1.5px solid #d4d4d8;
}

.back-link {
  display: block; margin-top: 16px; font-size: 14px; color: #999;
  cursor: pointer; background: none; border: none; font-family: inherit;
}

@media (max-width: 400px) {
  .app { padding: 32px 18px 28px; border-radius: 24px; }
  h1 { font-size: 24px; }
}
</style>

<div class="page" id="page3">

  <button class="back-link" onclick="goToPage(2)">← 返回选性别</button>
</div>

<!-- 第4页：搜索中 -->
<div class="page" id="page4">
  <div style="padding:20px 0;">
    <div class="search-ring"></div>
    <p class="search-text" id="searchHint">正在获取位置...</p>
  </div>
  <button class="back-link" onclick="goToPage(1)">取消</button>
</div>

<!-- 第5页：结果 -->
<div class="page" id="page5">
  <h1 style="font-size:22px;">✨ 你的虚拟身份</h1>
  <p class="subtitle" style="margin-bottom:20px;">以下身份纯属虚构，如有雷同纯属巧合</p>
  <div class="result-card" id="resultCard"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="generateNew()">🔄 换一个</button>
    <button class="btn btn-primary" onclick="goToPage(1)">🏠 重新开始</button>
  </div>
</div>

// ==================== 页面导航 ====================
function goToPage(n) {
  for (var i = 1; i <= 5; i++) {
    document.getElementById('page' + i).classList.remove('active');
  }
  document.getElementById('page' + n).classList.add('active');

  // 清理搜索状态和JSONP残留
  isSearching = false;
  var oldScript = document.getElementById('jsonp_script');
  if (oldScript) document.body.removeChild(oldScript);
  if (_amapCallbackName && window[_amapCallbackName]) delete window[_amapCallbackName];

  if (n === 1) { gender = null; cityName = ''; cityType = ''; }

  // 更新步骤点
  if (n <= 3) updateDots(n - 1);
}

function updateDots(step) {
  var groups = [['d1a','d2a','d3a'], ['d1b','d2b','d3b']];
  for (var g = 0; g < groups.length; g++) {
    for (var i = 0; i < 3; i++) {
      var el = document.getElementById(groups[g][i]);
      if (!el) continue;
      el.className = 'step-dot';
      if (i < step) el.classList.add('done');
      if (i === step - 1) el.classList.add('current');
    }
  }
}

    if (data.status === '1') {
      var c = data.city;
      if (c && typeof c === 'string' && c.length > 0) {
        cityName = c.replace(/市$/, '');
      } else if (data.province && typeof data.province === 'string') {
        cityName = data.province.replace(/省$/, '').replace(/市$/, '');
      } else {
        useRandomCity();
        showResult();
        return;
      }
      cityType = classifyCity(cityName);
    } else {
      useRandomCity();
    }
    showResult();
  };

  injectJSONP(url, cbName);
}

function injectJSONP(url, cbName) {
  var script = document.createElement('script');
  script.id = 'jsonp_script';
  script.src = url;
  script.onerror = function() {
    cleanupJSONP();
    useRandomCity();
    showResult();
  };

  var timeoutId = setTimeout(function() {
    if (window[cbName]) {
      cleanupJSONP();
      useRandomCity();
      showResult();
    }
  }, 6000);

  var origCb = window[cbName];
  window[cbName] = function(data) {
    clearTimeout(timeoutId);
    origCb(data);
  };

  document.body.appendChild(script);
}

function cleanupJSONP() {
  var script = document.getElementById('jsonp_script');
  if (script) document.body.removeChild(script);
  if (_amapCallbackName && window[_amapCallbackName]) {
    delete window[_amapCallbackName];
  }
}

function useRandomCity() {
  cityName = ['杭州','成都','武汉','南京','西安','长沙','苏州','宁波','厦门','青岛','郑州','昆明','合肥','沈阳','大连'][Math.floor(Math.random() * 15)];
  cityType = classifyCity(cityName);
}

// ==================== 生成身份 ====================
function generateIdentity() {
  // 确定性别
  var actualGender;
  if (gender === 'random') {
    actualGender = Math.random() < 0.5 ? 'male' : 'female';
  } else {
    actualGender = gender;
  }

  // 生成姓名
  var surname;
  if (actualGender === 'male') {
    surname = SURNAMES_MALE[Math.floor(Math.random() * SURNAMES_MALE.length)];
  } else {
    surname = SURNAMES_FEMALE[Math.floor(Math.random() * SURNAMES_FEMALE.length)];
  }

  var given;
  if (Math.random() < 0.3) {
    // 30%概率使用中性名
    given = GIVEN_UNISEX[Math.floor(Math.random() * GIVEN_UNISEX.length)];
    if (Math.random() < 0.5) given += GIVEN_UNISEX[Math.floor(Math.random() * GIVEN_UNISEX.length)];
  } else if (actualGender === 'male') {
    given = GIVEN_MALE[Math.floor(Math.random() * GIVEN_MALE.length)];
    if (Math.random() < 0.4) given += GIVEN_MALE[Math.floor(Math.random() * GIVEN_MALE.length)];
  } else {
    given = GIVEN_FEMALE[Math.floor(Math.random() * GIVEN_FEMALE.length)];
    if (Math.random() < 0.4) given += GIVEN_FEMALE[Math.floor(Math.random() * GIVEN_FEMALE.length)];
  }

  // 生成职业
  var ageGroup;
  if (age < 25) ageGroup = 'young';
  else if (age <= 40) ageGroup = 'mid';
  else ageGroup = 'senior';

  var occPool = OCCUPATIONS[ageGroup][actualGender] || OCCUPATIONS[ageGroup]['any'];
  var occPoolAny = OCCUPATIONS[ageGroup]['any'];
  var combined = occPool.concat(occPoolAny);
  var occupation = combined[Math.floor(Math.random() * combined.length)];

  // 生成在该城市工作的年限
  var yearsInCity;
  if (ageGroup === 'young') yearsInCity = Math.floor(Math.random() * 3) + 1;
  else if (ageGroup === 'mid') yearsInCity = Math.floor(Math.random() * 8) + 5;
  else yearsInCity = Math.floor(Math.random() * 20) + 10;

  if (yearsInCity > age - 18) yearsInCity = age - 18;

  // 选择故事模板
  var storyPool = WORK_STORIES[cityType + '_city'] || WORK_STORIES['mid_city'];
  var story = storyPool[Math.floor(Math.random() * storyPool.length)]
    .replace(/{city}/g, cityName + '市')
    .replace(/{years}/g, yearsInCity);

  return {
    name: surname + given,
    gender: actualGender === 'male' ? '男' : '女',
    age: age,
    occupation: occupation,
    yearsInCity: yearsInCity,
    city: cityName + '市',
    story: story
  };
}

function showResult() {
  isSearching = false;
  goToPage(5);

  var identity = generateIdentity();
  var avatar = identity.gender === '男' ? '👨' : '👩';

  var html = '';
  html += '<div class="result-avatar">' + avatar + '</div>';
  html += '<div class="result-name">' + identity.name + '</div>';
  html += '<div class="result-city">📍 ' + identity.city + '</div>';
  html += '<div class="result-row"><span class="key">性别</span><span class="val">' + identity.gender + '</span></div>';
  html += '<div class="result-row"><span class="key">年龄</span><span class="val">' + identity.age + '岁</span></div>';
  html += '<div class="result-row"><span class="key">职业</span><span class="val">' + identity.occupation + '</span></div>';
  html += '<div class="result-row"><span class="key">在' + identity.city + '</span><span class="val">' + identity.yearsInCity + '年</span></div>';
  html += '<div class="story-card">📖 ' + identity.story + '</div>';

  document.getElementById('resultCard').innerHTML = html;
}

function generateNew() {
  // 重新随机一个身份（不重新定位）
  showResult();
}
</script>
